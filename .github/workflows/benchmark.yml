name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    name: Run Criterion benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-engine/target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('rust-engine/Cargo.lock') }}
          restore-keys: bench-${{ runner.os }}-cargo-

      - name: Run benchmarks
        working-directory: rust-engine
        run: cargo bench --bench render_bench -- --output-format bencher 2>&1 | tee bench_output.txt

      - name: Ensure gh-pages branch exists
        if: github.ref == 'refs/heads/main'
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "chore: initialize gh-pages for benchmark tracking"
            git push origin gh-pages
            git checkout main
          fi

      - name: Clean uncommitted changes before branch switch
        run: git checkout -- .

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: FastPDF Criterion Benchmarks
          tool: cargo
          output-file-path: rust-engine/bench_output.txt
          # Only push results on main branch
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Store results in gh-pages branch
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: criterion-report
          path: rust-engine/target/criterion
          retention-days: 30
